<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Checklist Metal - Proyecto IA 🤘</title>

<style>
body {
    background: linear-gradient(black, #1a0000);
    color: #ff1a1a;
    font-family: "Courier New", monospace;
    padding: 20px;
}

h1 {
    text-align: center;
    text-shadow: 0 0 15px red;
}

h2 {
    border-bottom: 1px solid red;
}

.section {
    background: #0d0d0d;
    padding: 15px;
    margin: 20px 0;
    border-left: 5px solid red;
    box-shadow: 0 0 10px red;
}

label {
    display: block;
    margin: 8px 0;
    cursor: pointer;
}

input[type="checkbox"] {
    transform: scale(1.3);
    margin-right: 10px;
}

button {
    display: block;
    margin: 20px auto;
    padding: 10px 20px;
    background: red;
    color: black;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: black;
    color: red;
    border: 1px solid red;
}
</style>

</head>
<body>

<h1>🤘 LISTA DE CHEQUEO - PROYECTO IA 🤘</h1>

<div class="section">
<h2>1. Contexto y diagnóstico del equipo</h2>
<label><input type="checkbox"> El contexto es realista y claramente definido.</label>
<label><input type="checkbox"> Se describen problemas reales del trabajo en equipo.</label>
<label><input type="checkbox"> Las problemáticas están justificadas.</label>
<label><input type="checkbox"> El diagnóstico se relaciona con el uso de IA.</label>
</div>

<div class="section">
<h2>2. Objetivos del proyecto</h2>
<label><input type="checkbox"> El objetivo general integra IA, trabajo en equipo y ética.</label>
<label><input type="checkbox"> Los objetivos específicos son claros y coherentes.</label>
<label><input type="checkbox"> Los objetivos están alineados con el syllabus.</label>
</div>

<div class="section">
<h2>3. Integración de herramientas de IA</h2>
<label><input type="checkbox"> Las herramientas de IA están justificadas.</label>
<label><input type="checkbox"> La IA apoya el trabajo humano y no lo reemplaza.</label>
<label><input type="checkbox"> Existe control humano sobre las decisiones.</label>
</div>

<div class="section">
<h2>4. Planificación y comunicación</h2>
<label><input type="checkbox"> Existe un sistema de planificación apoyado por IA.</label>
<label><input type="checkbox"> Los canales de comunicación son claros.</label>
<label><input type="checkbox"> La IA apoya la organización de la comunicación.</label>
</div>

<div class="section">
<h2>5. Ética y enfoque humano</h2>
<label><input type="checkbox"> Se analizan los impactos éticos del uso de IA.</label>
<label><input type="checkbox"> Se respeta la privacidad y los datos del equipo.</label>
<label><input type="checkbox"> Las decisiones finales son humanas.</label>
</div>

<div class="section">
<h2>6. Documento y presentación final</h2>
<label><input type="checkbox"> El documento está completo y bien estructurado.</label>
<label><input type="checkbox"> La presentación es clara y bien argumentada.</label>
<label><input type="checkbox"> Todos los integrantes participan.</label>
</div>

<div class="section">
<h2>7. Reflexión individual</h2>
<label><input type="checkbox"> Se entrega reflexión individual.</label>
<label><input type="checkbox"> La reflexión es crítica y no solo descriptiva.</label>
<label><input type="checkbox"> Se identifican aprendizajes técnicos y humanos.</label>
</div>

<button onclick="guardar()">💾 Guardar progreso</button>

<script>
function guardar() {
    let checks = document.querySelectorAll("input[type='checkbox']");
    let datos = [];

    checks.forEach((check, i) => {
        datos[i] = check.checked;
    });

    localStorage.setItem("checklistMetal", JSON.stringify(datos));
    alert("🔥 Progreso guardado 🔥");
}

function cargar() {
    let datos = JSON.parse(localStorage.getItem("checklistMetal"));
    if (!datos) return;

    let checks = document.querySelectorAll("input[type='checkbox']");
    checks.forEach((check, i) => {
        check.checked = datos[i];
    });
}

cargar();
</script>

</body>
</html>
