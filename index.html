<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Checklist Metal IA 🤘</title>

<link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">

<style>
body {
    background: url("https://www.transparenttextures.com/patterns/skulls.png"),
                radial-gradient(circle, #000000, #1a0000);
    color: #e60000;
    font-family: 'Metal Mania', cursive;
    padding: 20px;
    position: relative;
}

/* CAPA OSCURA ENCIMA */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: -1;
}

/* TÍTULO */
h1 {
    text-align: center;
    font-size: 50px;
    text-shadow: 0 0 20px red, 0 0 40px black;
    letter-spacing: 3px;
}

/* SECCIONES */
.section {
    background: linear-gradient(145deg, #0d0d0d, #1a1a1a);
    padding: 20px;
    margin: 25px 0;
    border-left: 6px solid red;
    box-shadow: 0 0 15px red;
    border-radius: 10px;
}

/* SUBTÍTULOS */
h2 {
    color: #ff3333;
    border-bottom: 2px solid red;
}

/* CHECKS */
label {
    display: block;
    margin: 10px 0;
    font-size: 18px;
    transition: 0.3s;
}

label:hover {
    color: white;
    text-shadow: 0 0 10px red;
}

/* CHECKBOX */
input[type="checkbox"] {
    transform: scale(1.4);
    margin-right: 10px;
    accent-color: red;
}

/* TEXTO TACHADO */
input:checked + span {
    text-decoration: line-through;
    color: gray;
}

/* BOTÓN */
button {
    display: block;
    margin: 30px auto;
    padding: 15px 30px;
    background: linear-gradient(red, darkred);
    color: black;
    border: none;
    font-size: 18px;
    cursor: pointer;
    border-radius: 10px;
    box-shadow: 0 0 15px red;
}

button:hover {
    background: black;
    color: red;
    border: 1px solid red;
    box-shadow: 0 0 25px red;
}
</style>

</head>

<body>

<h1>🤘 HEAVY METAL CHECKLIST 🤘</h1>

<div class="section">
<h2>1. Contexto y diagnóstico</h2>
<label><input type="checkbox"><span> El contexto es realista y claramente definido.</span></label>
<label><input type="checkbox"><span> Se describen problemas reales del trabajo en equipo.</span></label>
<label><input type="checkbox"><span> Las problemáticas están justificadas.</span></label>
<label><input type="checkbox"><span> El diagnóstico se relaciona con el uso de IA.</span></label>
</div>

<div class="section">
<h2>2. Objetivos</h2>
<label><input type="checkbox"><span> El objetivo general integra IA, trabajo en equipo y ética.</span></label>
<label><input type="checkbox"><span> Los objetivos específicos son claros y coherentes.</span></label>
<label><input type="checkbox"><span> Los objetivos están alineados con el syllabus.</span></label>
</div>

<div class="section">
<h2>3. Integración de IA</h2>
<label><input type="checkbox"><span> Las herramientas de IA están justificadas.</span></label>
<label><input type="checkbox"><span> La IA apoya el trabajo humano y no lo reemplaza.</span></label>
<label><input type="checkbox"><span> Existe control humano sobre las decisiones.</span></label>
</div>

<div class="section">
<h2>4. Planificación y comunicación</h2>
<label><input type="checkbox"><span> Existe un sistema de planificación apoyado por IA.</span></label>
<label><input type="checkbox"><span> Los canales de comunicación son claros.</span></label>
<label><input type="checkbox"><span> La IA apoya la organización de la comunicación.</span></label>
</div>

<div class="section">
<h2>5. Ética y enfoque humano</h2>
<label><input type="checkbox"><span> Se analizan los impactos éticos del uso de IA.</span></label>
<label><input type="checkbox"><span> Se respeta la privacidad y los datos del equipo.</span></label>
<label><input type="checkbox"><span> Las decisiones finales son humanas.</span></label>
</div>

<div class="section">
<h2>6. Documento y presentación final</h2>
<label><input type="checkbox"><span> El documento está completo y bien estructurado.</span></label>
<label><input type="checkbox"><span> La presentación es clara y bien argumentada.</span></label>
<label><input type="checkbox"><span> Todos los integrantes participan.</span></label>
</div>

<div class="section">
<h2>7. Reflexión individual</h2>
<label><input type="checkbox"><span> Se entrega reflexión individual.</span></label>
<label><input type="checkbox"><span> La reflexión es crítica y no solo descriptiva.</span></label>
<label><input type="checkbox"><span> Se identifican aprendizajes técnicos y humanos.</span></label>
</div>

<button onclick="guardar()">💾 GUARDAR PROGRESO</button>

<script>
function guardar() {
    let checks = document.querySelectorAll("input[type='checkbox']");
    let datos = [];

    checks.forEach((check, i) => {
        datos[i] = check.checked;
    });

    localStorage.setItem("metalChecklist", JSON.stringify(datos));
    alert("🔥 Progreso guardado, metalero 🤘🔥");
}

function cargar() {
    let datos = JSON.parse(localStorage.getItem("metalChecklist"));
    if (!datos) return;

    let checks = document.querySelectorAll("input[type='checkbox']");
    checks.forEach((check, i) => {
        check.checked = datos[i];
    });
}

cargar();
</script>

</body>
</html>
